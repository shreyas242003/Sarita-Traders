<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <g transform="translate(150,150)">
    <!-- Hex Nut Shape -->
    <polygon points="-40,-23 -20,-40 20,-40 40,-23 40,23 20,40 -20,40 -40,23" 
             fill="#94a3b8" stroke="#64748b" stroke-width="2"/>
    <!-- Inner Threading Hole -->
    <circle r="15" fill="none" stroke="#475569" stroke-width="2"/>
    <!-- Threading Lines -->
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#475569" stroke-width="1"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#475569" stroke-width="1"/>
    <line x1="-12" y1="8" x2="12" y2="8" stroke="#475569" stroke-width="1"/>
  </g>
  <text x="50%" y="85%" font-family="system-ui" font-size="14" fill="#64748b" text-anchor="middle">
    Product Image
  </text>
</svg>

